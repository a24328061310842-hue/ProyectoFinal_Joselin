<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Joselin García de Luna - Películas</title>

    <link rel="stylesheet" href="estilopeliculas.css">

</head>

<body>

    <div class="container">

        <h1>PELICULAS</h1>
        <h3>Joselin García de Luna</h3>

        <form id="form">

            <input 
                type="text" 
                id="search" 
                placeholder="Buscar película..."
            >

            <input type="submit" value="Buscar">

        </form>

    </div>

    <!-- CONTENEDOR DE PELICULAS -->
    <main id="main"></main>

<script>

const API_URL =
'https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=3fd2be6f0c70a2a598f084ddfb75487c&page=1';

const IMG_PATH =
'https://image.tmdb.org/t/p/w1280';

const SEARCH_API =
'https://api.themoviedb.org/3/search/movie?api_key=3fd2be6f0c70a2a598f084ddfb75487c&query=';

const main = document.getElementById('main');
const form = document.getElementById('form');
const search = document.getElementById('search');

getMovies(API_URL);

async function getMovies(url){

    const res = await fetch(url);

    const data = await res.json();

    showMovies(data.results);
}

function showMovies(movies){

    main.innerHTML = '';

    movies.forEach((movie) => {

        const {
            title,
            poster_path,
            vote_average,
            overview
        } = movie;

        const movieEl = document.createElement('div');

        movieEl.classList.add('movie');

        movieEl.innerHTML = `

            <div class="movie-img">

                <img 
                    src="${IMG_PATH + poster_path}" 
                    alt="${title}"
                >

                <!-- CAPA TRANSPARENTE -->
                <div class="overlay">

                    <h2>${title}</h2>

                    <span class="${getClassByRate(vote_average)}">
                        ⭐ ${vote_average}
                    </span>

                </div>

            </div>

            <!-- DESCRIPCION -->
            <div class="movie-text">

                <h3>Overview</h3>

                <p>
                    ${overview ? overview.substring(0, 100) + "..." : "Sin descripción"}
                </p>

            </div>

        `;

        /* CLICK SOLO EN LA IMAGEN */

        const movieImg = movieEl.querySelector('.movie-img');

        movieImg.addEventListener('click', () => {

            movieEl.classList.toggle('active');

        });

        main.appendChild(movieEl);

    });
}

function getClassByRate(vote){

    if(vote >= 8){

        return 'blue';

    }else if(vote >= 5){

        return 'orange';

    }else{

        return 'red';
    }
}

form.addEventListener('submit', (e) => {

    e.preventDefault();

    const searchTerm = search.value;

    if(searchTerm && searchTerm !== ''){

        getMovies(SEARCH_API + searchTerm);

        search.value = '';

    }else{

        window.location.reload();
    }
});

</script>

</body>
</html>
